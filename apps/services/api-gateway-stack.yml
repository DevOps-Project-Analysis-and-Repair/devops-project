AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This template deploys an HTTP API Gateway with three endpoints, each triggering a different Lambda function.

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String

Resources:
  # HTTP API Gateway
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${EnvironmentName}-http-api
      ProtocolType: HTTP

  # Execution Role
  ApiGatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !ImportValue Upload-FunctionArn

  # Integrations for each Lambda
  UploadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !ImportValue Upload-FunctionArn
      PayloadFormatVersion: "2.0"
      CredentialsArn: !GetAtt ApiGatewayExecutionRole.Arn

  # AnalyzeIntegration:
  #   Type: AWS::ApiGatewayV2::Integration
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     IntegrationType: AWS_PROXY
  #     IntegrationUri: !Ref AnalyzeLambdaFunctionArn
  #     PayloadFormatVersion: "2.0"
  #     CredentialsArn: !GetAtt ApiGatewayExecutionRole.Arn

  # FixIntegration:
  #   Type: AWS::ApiGatewayV2::Integration
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     IntegrationType: AWS_PROXY
  #     IntegrationUri: !Ref FixLambdaFunctionArn
  #     PayloadFormatVersion: "2.0"
  #     CredentialsArn: !GetAtt ApiGatewayExecutionRole.Arn

  # Routes for each endpoint
  UploadRootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /upload'
      Target: !Join
        - /
        - - integrations
          - !Ref UploadIntegration

  UploadProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /upload/{proxy+}'
      Target: !Join
        - /
        - - integrations
          - !Ref UploadIntegration

  # Stage
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  # Permissions for API Gateway to invoke each Lambda
  UploadLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue Upload-FunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  # AnalyzeLambdaInvokePermission:
  #   Type: AWS::Lambda::Permission
  #   Properties:
  #     FunctionName: !Ref AnalyzeLambdaFunctionArn
  #     Action: lambda:InvokeFunction
  #     Principal: apigateway.amazonaws.com
  #     SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  # FixLambdaInvokePermission:
  #   Type: AWS::Lambda::Permission
  #   Properties:
  #     FunctionName: !Ref FixLambdaFunctionArn
  #     Action: lambda:InvokeFunction
  #     Principal: apigateway.amazonaws.com
  #     SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

Outputs:
  ApiEndpoint:
    Description: The HTTP API Gateway base URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  UploadEndpoint:
    Description: The /upload endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/upload"
  # AnalyzeEndpoint:
  #   Description: The /analyze endpoint URL
  #   Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/analyze"
  # FixEndpoint:
  #   Description: The /fix endpoint URL
  #   Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazons.com/fix"
