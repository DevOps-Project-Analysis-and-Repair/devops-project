AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This template deploys an HTTP API Gateway with three endpoints, each triggering a different Lambda function.

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String

Resources:
  # HTTP API Gateway
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${EnvironmentName}-http-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "*"
        AllowHeaders:
          - "*"
        MaxAge: 86400

  # Execution Role
  ApiGatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !ImportValue Upload-FunctionArn
                  - !ImportValue Fix-FunctionArn

  # Integrations
  UploadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !ImportValue Upload-FunctionArn
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt ApiGatewayExecutionRole.Arn

  FixIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !ImportValue Fix-FunctionArn
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt ApiGatewayExecutionRole.Arn

  # Routes for each endpoint
  UploadGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /upload'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadPutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PUT /upload'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PATCH /upload'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /upload'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadProxyGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /upload/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadProxyPutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PUT /upload/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadProxyPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PATCH /upload/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  UploadProxyPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /upload/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref UploadIntegration]]

  FixGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /fix'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixPutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PUT /fix'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PATCH /fix'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /fix'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixProxyGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /fix/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixProxyPutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PUT /fix/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixProxyPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PATCH /fix/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  FixProxyPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /fix/{proxy+}'
      Target: !Join ["/", ["integrations", !Ref FixIntegration]]

  # Stage
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  # Permissions for API Gateway to invoke each Lambda
  UploadLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue Upload-FunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  FixLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue Fix-FunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

Outputs:
  ApiEndpoint:
    Description: The HTTP API Gateway base URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UploadEndpoint:
    Description: The /upload endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/upload'
  FixEndpoint:
    Description: The /fix endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/fix'
