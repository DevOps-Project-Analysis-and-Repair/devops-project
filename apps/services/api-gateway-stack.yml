AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This template deploys an HTTP API Gateway with three endpoints, each triggering a different Lambda function.

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String

Resources:
  # HTTP API Gateway
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${EnvironmentName}-http-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "'*'"
        AllowMethods:
          - "'*'"
        AllowHeaders:
          - "'*'"
        MaxAge: 86400
      
  # Execution Role
  ApiGatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !ImportValue Upload-FunctionArn

  # Integrations
  OptionsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: MOCK
      RequestTemplates:
        "$default": '{"statusCode": 200}'
      IntegrationMethod: OPTIONS
      IntegrationResponseSelectionExpression: "$default"
      PassthroughBehavior: WHEN_NO_MATCH
      ResponseParameters:
        "method.response.header.Access-Control-Allow-Headers": "'*'"
        "method.response.header.Access-Control-Allow-Methods": "'*'"
        "method.response.header.Access-Control-Allow-Origin": "'*'"
        "method.response.header.Access-Control-Max-Age": "'86400'"

  UploadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !ImportValue Upload-FunctionArn
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt ApiGatewayExecutionRole.Arn

  # Routes for each endpoint
  UploadRootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /upload'
      Target: !Join
        - /
        - - integrations
          - !Ref UploadIntegration

  UploadProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /upload/{proxy+}'
      Target: !Join
        - /
        - - integrations
          - !Ref UploadIntegration

  UploadRootOptionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'OPTIONS /upload'
      Target: !Join
        - /
        - - integrations
          - !Ref OptionsIntegration

  UploadProxyOptionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'OPTIONS /upload/{proxy+}'
      Target: !Join
        - /
        - - integrations
          - !Ref OptionsIntegration

  # Stage
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  # Permissions for API Gateway to invoke each Lambda
  UploadLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue Upload-FunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

Outputs:
  ApiEndpoint:
    Description: The HTTP API Gateway base URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UploadEndpoint:
    Description: The /upload endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/upload'
