AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This template deploys an HTTP API Gateway with three endpoints, each triggering a different Lambda function.

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String

Resources:
  # HTTP API Gateway
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${EnvironmentName}-http-api
      ProtocolType: HTTP

  # Integrations for each Lambda
  UploadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !ImportValue Upload-FunctionArn
      PayloadFormatVersion: "2.0"

  # AnalyzeIntegration:
  #   Type: AWS::ApiGatewayV2::Integration
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     IntegrationType: AWS_PROXY
  #     IntegrationUri: !Ref AnalyzeLambdaFunctionArn
  #     PayloadFormatVersion: "2.0"

  # FixIntegration:
  #   Type: AWS::ApiGatewayV2::Integration
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     IntegrationType: AWS_PROXY
  #     IntegrationUri: !Ref FixLambdaFunctionArn
  #     PayloadFormatVersion: "2.0"

  # Routes for each endpoint
  UploadRootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /upload"
      Target: !Sub integrations/${UploadIntegration}

  UploadProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /upload/{proxy+}"
      Target: !Sub integrations/${UploadIntegration}

  # AnalyzeRootRoute:
  #   Type: AWS::ApiGatewayV2::Route
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     RouteKey: "ANY /analyze"
  #     Target: !Sub integrations/${AnalyzeIntegration}

  # AnalyzeProxyRoute:
  #   Type: AWS::ApiGatewayV2::Route
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     RouteKey: "ANY /analyze/{proxy+}"
  #     Target: !Sub integrations/${AnalyzeIntegration}

  # FixRootRoute:
  #   Type: AWS::ApiGatewayV2::Route
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     RouteKey: "ANY /fix"
  #     Target: !Sub integrations/${FixIntegration}

  # FixProxyRoute:
  #   Type: AWS::ApiGatewayV2::Route
  #   Properties:
  #     ApiId: !Ref HttpApi
  #     RouteKey: "ANY /fix/{proxy+}"
  #     Target: !Sub integrations/${FixIntegration}

  # Stage
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: api
      AutoDeploy: true

  # Permissions for API Gateway to invoke each Lambda
  UploadRootLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue Upload-FunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/upload

  UploadProxyLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue Upload-FunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/upload/{proxy+}

  # AnalyzeLambdaInvokePermission:
  #   Type: AWS::Lambda::Permission
  #   Properties:
  #     FunctionName: !Ref AnalyzeLambdaFunctionArn
  #     Action: lambda:InvokeFunction
  #     Principal: apigateway.amazonaws.com
  #     SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/analyze

  # FixLambdaInvokePermission:
  #   Type: AWS::Lambda::Permission
  #   Properties:
  #     FunctionName: !Ref FixLambdaFunctionArn
  #     Action: lambda:InvokeFunction
  #     Principal: apigateway.amazonaws.com
  #     SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/fix

Outputs:
  ApiEndpoint:
    Description: The HTTP API Gateway base URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api
  UploadEndpoint:
    Description: The /upload endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/upload
  # AnalyzeEndpoint:
  #   Description: The /analyze endpoint URL
  #   Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/analyze
  # FixEndpoint:
  #   Description: The /fix endpoint URL
  #   Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/fix
