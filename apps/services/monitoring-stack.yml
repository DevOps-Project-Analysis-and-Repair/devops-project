  # CloudWatch Alarms
  ApiGateway4XXAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "ApiGateway4XXErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "4XXError"
      Namespace: "AWS/ApiGateway"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: ApiName
          Value: "prod-http-api"
        - Name: Stage
          Value: "$default"
      AlarmDescription: "Alarm when API Gateway returns 4XX errors"
      TreatMissingData: notBreaching

  ApiGateway5XXAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "ApiGateway5XXErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "5XXError"
      Namespace: "AWS/ApiGateway"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: ApiName
          Value: "prod-http-api"
        - Name: Stage
          Value: "$default"
      AlarmDescription: "Alarm when API Gateway returns 5XX errors"
      TreatMissingData: notBreaching

  UploadLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "UploadLambdaErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "Errors"
      Namespace: "AWS/Lambda"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: FunctionName
          Value: "Upload-upload-stack"
      AlarmDescription: "Alarm when Upload Lambda function errors occur"
      TreatMissingData: notBreaching

  AnalysisLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "AnalysisLambdaErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "Errors"
      Namespace: "AWS/Lambda"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: FunctionName
          Value: "Analysis-analysis-stack"
      AlarmDescription: "Alarm when Analysis Lambda function errors occur"
      TreatMissingData: notBreaching

  FixLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "FixLambdaErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "Errors"
      Namespace: "AWS/Lambda"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: FunctionName
          Value: "Fix-fix-stack"
      AlarmDescription: "Alarm when Fix Lambda function errors occur"
      TreatMissingData: notBreaching

  DynamoDBThrottledRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "DynamoDBThrottledRequestsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "ThrottledRequests"
      Namespace: "AWS/DynamoDB"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: TableName
          Value: "Projects-upload-stack"
      AlarmDescription: "Alarm when DynamoDB table is throttled"
      TreatMissingData: notBreaching

  S3BucketSizeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "S3BucketSizeAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "BucketSizeBytes"
      Namespace: "AWS/S3"
      Period: 86400
      Statistic: Average
      Threshold: 1073741824
      Dimensions:
        - Name: BucketName
          Value: "files-upload-stack"
        - Name: StorageType
          Value: "AllStorageTypes"
      AlarmDescription: "Alarm when S3 bucket size exceeds 1 GB"
      TreatMissingData: notBreaching
