AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Monitoring Stack for Backend

Resources:
  # CloudWatch Dashboard
  BackendDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: BackendDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiName", "prod-http-api", "Stage", "%24default", {"stat": "Sum", "period": 300}],
                  ["AWS/ApiGateway", "Latency", "ApiName", "prod-http-api", "Stage", "%24default", {"stat": "Average", "period": 300}],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "prod-http-api", "Stage", "%24default", {"stat": "Sum", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "eu-west-1",
                "title": "API Gateway Metrics"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "Upload-upload-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/Lambda", "Errors", "FunctionName", "Upload-upload-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/Lambda", "Duration", "FunctionName", "Upload-upload-stack", {"stat": "Average", "period": 300}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "Analysis-analysis-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/Lambda", "Errors", "FunctionName", "Analysis-analysis-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/Lambda", "Duration", "FunctionName", "Analysis-analysis-stack", {"stat": "Average", "period": 300}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "Fix-fix-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/Lambda", "Errors", "FunctionName", "Fix-fix-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/Lambda", "Duration", "FunctionName", "Fix-fix-stack", {"stat": "Average", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "Projects-upload-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "Projects-upload-stack", {"stat": "Sum", "period": 300}],
                  ["AWS/DynamoDB", "SuccessfulRequestLatency", "TableName", "Projects-upload-stack", {"stat": "Average", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "eu-west-1",
                "title": "DynamoDB Metrics"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/S3", "NumberOfObjects", "BucketName", "files-upload-stack", "StorageType", "AllStorageTypes", {"stat": "Average", "period": 300}],
                  ["AWS/S3", "BucketSizeBytes", "BucketName", "files-upload-stack", "StorageType", "AllStorageTypes", {"stat": "Average", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "eu-west-1",
                "title": "S3 Metrics"
              }
            }
          ]
        }

  # CloudWatch Alarms
  ApiGateway5XXAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "ApiGateway5XXErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "5XXError"
      Namespace: "AWS/ApiGateway"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: ApiName
          Value: "prod-http-api"
        - Name: Stage
          Value: "%24default"
      AlarmDescription: "Alarm when API Gateway returns 5XX errors"
      TreatMissingData: notBreaching

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "LambdaErrorsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "Errors"
      Namespace: "AWS/Lambda"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: FunctionName
          Value: "Upload-upload-stack"
        - Name: FunctionName
          Value: "Analysis-analysis-stack"
        - Name: FunctionName
          Value: "Fix-fix-stack"
      AlarmDescription: "Alarm when Lambda function errors occur"
      TreatMissingData: notBreaching

  DynamoDBThrottledRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "DynamoDBThrottledRequestsAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "ThrottledRequests"
      Namespace: "AWS/DynamoDB"
      Period: 300
      Statistic: Sum
      Threshold: 1
      Dimensions:
        - Name: TableName
          Value: "Projects-upload-stack"
      AlarmDescription: "Alarm when DynamoDB table is throttled"
      TreatMissingData: notBreaching

  S3BucketSizeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "S3BucketSizeAlarm"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: "BucketSizeBytes"
      Namespace: "AWS/S3"
      Period: 86400 # Daily
      Statistic: Average
      Threshold: 1073741824 # 1 GB
      Dimensions:
        - Name: BucketName
          Value: "files-upload-stack"
        - Name: StorageType
          Value: "AllStorageTypes"
      AlarmDescription: "Alarm when S3 bucket size exceeds 1 GB"
      TreatMissingData: notBreaching
