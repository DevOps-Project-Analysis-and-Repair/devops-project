                  "width": 8,
                  "height": 6,
                  "properties": {
                      "metrics": [
                          [ "AWS/NATGateway", "IdleTimeoutCount", "NatGatewayId", "nat-03a6cd23dc4015a40", { "period": 300, "stat": "Sum" } ],
                          [ "AWS/NATGateway", "IdleTimeoutCount", "NatGatewayId", "nat-006cdecfe83aa0c93", { "period": 300, "stat": "Sum" } ]
                      ],
