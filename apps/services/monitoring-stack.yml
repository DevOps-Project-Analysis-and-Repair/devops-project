                      "timezone": "UTC",
                      "title": "Duration: Average",
                      "view": "timeSeries",
                      "stacked": false
                  }
              },
              {
                  "type": "metric",
                  "x": 0,
                  "y": 12,
                  "width": 8,
                  "height": 6,
                  "properties": {
                      "metrics": [
                          [ "AWS/Lambda", "Errors", "FunctionName", "Analysis-analysis-stack", { "period": 300, "stat": "Sum" } ],
                          [ "AWS/Lambda", "Errors", "FunctionName", "Upload-upload-stack", { "period": 300, "stat": "Sum" } ],
                          [ "AWS/Lambda", "Errors", "FunctionName", "Fix-fix-stack", { "period": 300, "stat": "Sum" } ]
                      ],
                      "legend": {
