                          [ "AWS/S3", "NumberOfObjects", "BucketName", "react-cors-spa-frontend-stack", "StorageType", "AllStorageTypes", { "period": 86400, "stat": "Average" } ],
                          [ "AWS/S3", "NumberOfObjects", "BucketName", "react-cors-spa-frontend-stack-logs", "StorageType", "AllStorageTypes", { "period": 86400, "stat": "Average" } ],
                          [ "AWS/S3", "NumberOfObjects", "BucketName", "uploadservicefiles", "StorageType", "AllStorageTypes", { "period": 86400, "stat": "Average" } ]
                      ],
                      "legend": {
                          "position": "right"
                      },
                      "region": "eu-west-1",
                      "liveData": false,
                      "timezone": "UTC",
                      "title": "NumberOfObjects: Average",
                      "view": "timeSeries",
                      "stacked": false
                  }
              },
              {
                  "type": "metric",
                  "x": 0,
                  "y": 18,
                  "width": 8,
                  "height": 6,
                  "properties": {
                      "metrics": [
                          [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "Projects-upload-stack", { "period": 300, "stat": "Sum" } ]
                      ],
                      "legend": {
                          "position": "bottom"
                      },
                      "region": "eu-west-1",
                      "liveData": false,
                      "timezone": "UTC",
                      "title": "ConsumedReadCapacityUnits: Sum",
                      "view": "timeSeries",
                      "stacked": false
                  }
              },
              {
                  "type": "metric",
                  "x": 8,
                  "y": 18,
                  "width": 8,
                  "height": 6,
                  "properties": {
                      "metrics": [
                          [ "AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "Projects-upload-stack", { "period": 300, "stat": "Sum" } ]
                      ],
                      "legend": {
                          "position": "bottom"
                      },
                      "region": "eu-west-1",
                      "liveData": false,
                      "timezone": "UTC",
                      "title": "ConsumedWriteCapacityUnits: Sum",
                      "view": "timeSeries",
                      "stacked": false
                  }
              }
          ]
