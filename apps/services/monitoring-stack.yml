                      "title": "Invocations: Sum",
                      "view": "timeSeries",
                      "stacked": false
                  }
              },
              {
                  "type": "metric",
                  "x": 8,
                  "y": 6,
                  "width": 8,
                  "height": 6,
                  "properties": {
                      "metrics": [
                          [ "AWS/Lambda", "Duration", "FunctionName", "Analysis-analysis-stack", { "period": 300, "stat": "Average" } ],
                          [ "AWS/Lambda", "Duration", "FunctionName", "Fix-fix-stack", { "period": 300, "stat": "Average" } ],
                          [ "AWS/Lambda", "Duration", "FunctionName", "Upload-upload-stack", { "period": 300, "stat": "Average" } ]
                      ],
