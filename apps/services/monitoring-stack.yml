                      ],
                      "legend": {
                          "position": "bottom"
                      },
                      "region": "eu-west-1",
                      "liveData": false,
                      "timezone": "UTC",
                      "title": "ActiveConnectionCount: Maximum",
                      "view": "timeSeries",
                      "stacked": false
                  }
              },
              {
                  "type": "metric",
                  "x": 8,
                  "y": 0,
                  "width": 8,
                  "height": 6,
                  "properties": {
                      "metrics": [
                          [ "AWS/NATGateway", "PacketsDropCount", "NatGatewayId", "nat-03a6cd23dc4015a40", { "period": 300, "stat": "Sum" } ],
