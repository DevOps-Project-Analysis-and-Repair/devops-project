name: CI Frontend Checks

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci-frontend.yml"
      - "apps/frontend/**"

  push:
    branches: [main]
    paths:
      - "apps/frontend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: lint
        run: npm run lint

      - name: test
        run: npm run test

      - name: build
        run: npm run build
