name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "networking/**"
      - "apps/upload-service/**"
      - "apps/llm-service/**"
      - "apps/analysis-service/**"

env:
  AWS_REGION: eu-west-1
  GIT_HASH: ${{ github.sha }}

jobs:
  deploy_vpc_stack:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://./networking/vpc-stack.yml

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file ./networking/vpc-stack.yml \
            --stack-name vpc-stack \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              EnvironmentName=prod

  deploy_upload_stack:
    needs: [deploy_vpc_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish Dockerfile
        working-directory: ./apps/upload-service
        run: sh ./publish.sh

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://./apps/upload-service/upload-stack.yml

      - name: Deploy CloudFormation
        working-directory: ./apps/upload-service
        run: sh ./deploy.sh

  deploy_analysis_stack:
    needs: [deploy_vpc_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish Dockerfile
        working-directory: ./apps/analysis-service
        run: sh ./publish.sh

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://./apps/analysis-service/analysis-stack.yml

      - name: Deploy CloudFormation
        working-directory: ./apps/analysis-service
        run: sh ./deploy.sh

  deploy_fix_stack:
    needs: [deploy_vpc_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish Dockerfile
        working-directory: ./apps/llm-service
        run: sh ./publish.sh

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://./apps//llm-service/fix-stack.yml

      - name: Deploy CloudFormation
        working-directory: ./apps/llm-service
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: sh ./deploy.sh

  deploy_api_gateway_stack:
    needs: [deploy_upload_stack, deploy_fix_stack, deploy_analysis_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://./networking/api-gateway-stack.yml

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file ./networking/api-gateway-stack.yml \
            --stack-name api-gateway-stack \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              EnvironmentName=prod
    
  deploy_monitoring_stack:
    needs: [deploy_api_gateway_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://./networking/monitoring-stack.yml

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file ./networking/monitoring-stack.yml \
            --stack-name monitoring-stack \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              EnvironmentName=prod