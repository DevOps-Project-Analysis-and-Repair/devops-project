name: Deploy Backend

on:
  push:
    # branches:
    #   - main
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "networking/**"
      - "apps/upload-service/**"
      - "apps/fix-service/**"
      - "apps/analysis-service/**"

env:
  AWS_REGION: eu-west-1
  GIT_HASH: ${{ github.sha }}

jobs:
  deploy_vpc_stack:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy Networking stack
        uses: ./.github/actions/deploy-networking
        with:
          template-file: ./networking/vpc-stack.yml
          stack-name: vpc-stack
          parameter-overrides: EnvironmentName=prod

  deploy_upload_stack:
    needs: [deploy_vpc_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy Lambda service
        uses: ./.github/actions/deploy-lambda
        with:
          working-directory: ./apps/upload-service
          template-file: ./apps/upload-service/upload-stack.yml
          stack-name: upload-service-stack
          parameter-overrides: EnvironmentName=prod

  deploy_analysis_stack:
    needs: [deploy_vpc_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy Lambda service
        uses: ./.github/actions/deploy-lambda
        with:
          working-directory: ./apps/analysis-service
          template-file: ./apps/analysis-service/analysis-stack.yml
          stack-name: analysis-service-stack
          parameter-overrides: EnvironmentName=prod

  deploy_fix_stack:
    needs: [deploy_vpc_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy Lambda service
        uses: ./.github/actions/deploy-lambda
        with:
          working-directory: ./apps/fix-service
          template-file: ./apps/fix-service/fix-stack.yml
          stack-name: fix-service-stack
          parameter-overrides: EnvironmentName=prod
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  deploy_api_gateway_stack:
    needs: [deploy_upload_stack, deploy_fix_stack, deploy_analysis_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy Networking stack
        uses: ./.github/actions/deploy-networking
        with:
          template-file: ./networking/api-gateway-stack.yml
          stack-name: api-gateway-stack
          parameter-overrides: EnvironmentName=prod

  deploy_monitoring_stack:
    needs: [deploy_api_gateway_stack]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy Networking stack
        uses: ./.github/actions/deploy-networking
        with:
          template-file: ./networking/monitoring-stack.yml
          stack-name: monitoring-stack
          parameter-overrides: EnvironmentName=prod
