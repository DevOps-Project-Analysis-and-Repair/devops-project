name: CI Backend Checks

on:
  pull_request:
    paths: &paths
      - ".github/workflows/ci-backend.yml"
      - "apps/upload-service/**"
      - "apps/fix-service/**"
      - "apps/analysis-service/**"
  push:
    paths: *paths

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - fix-service
          - upload-service
          - analysis-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          working-directory: apps/${{ matrix.service }}

      - run: npm run lint
        working-directory: apps/${{ matrix.service }}

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - fix-service
          - upload-service
          - analysis-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          working-directory: apps/${{ matrix.service }}

      - run: npm run build
        working-directory: apps/${{ matrix.service }}

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - upload-service
          - fix-service
          - analysis-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          working-directory: apps/${{ matrix.service }}

      - run: npm run build
        working-directory: apps/${{ matrix.service }}
