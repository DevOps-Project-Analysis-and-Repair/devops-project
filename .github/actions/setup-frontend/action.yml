name: Setup Frontend
description: Checkout repo, setup node, and install dependencies

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: apps/frontend/package-lock.json

    - run: npm ci
      working-directory: apps/frontend
